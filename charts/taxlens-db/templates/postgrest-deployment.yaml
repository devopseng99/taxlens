apiVersion: apps/v1
kind: Deployment
metadata:
  name: taxlens-postgrest
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: taxlens-db
    app.kubernetes.io/component: postgrest
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: taxlens-db
      app.kubernetes.io/component: postgrest
  template:
    metadata:
      labels:
        app.kubernetes.io/name: taxlens-db
        app.kubernetes.io/component: postgrest
    spec:
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      initContainers:
        - name: wait-for-pg
          image: docker.io/library/busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z taxlens-pg {{ .Values.postgres.port }}; do
                sleep 2
              done
              echo "PostgreSQL is ready."
          resources:
            limits:
              memory: 16Mi
            requests:
              cpu: 10m
              memory: 8Mi
      containers:
        - name: postgrest
          image: "{{ .Values.postgrest.image }}:{{ .Values.postgrest.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.postgrest.port }}
              protocol: TCP
          env:
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.secretName }}
                  key: {{ .Values.postgres.passwordKey }}
            - name: PGRST_DB_URI
              value: "postgres://authenticator:$(PG_PASSWORD)@taxlens-pg:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}"
            - name: PGRST_DB_SCHEMAS
              value: "public"
            - name: PGRST_DB_ANON_ROLE
              value: "app_anon"
            - name: PGRST_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgrest.jwtSecretName }}
                  key: {{ .Values.postgrest.jwtSecretKey }}
            - name: PGRST_SERVER_PORT
              value: {{ .Values.postgrest.port | quote }}
            - name: PGRST_DB_MAX_ROWS
              value: {{ .Values.postgrest.maxRows | quote }}
            - name: PGRST_DB_POOL
              value: {{ .Values.postgrest.dbPool | quote }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.postgrest.port }}
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.postgrest.port }}
            periodSeconds: 10
          resources:
            {{- toYaml .Values.postgrest.resources | nindent 12 }}
