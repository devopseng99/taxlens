{{- if .Values.flyway.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: taxlens-flyway-{{ now | date "20060102-150405" }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: taxlens-db
    app.kubernetes.io/component: flyway
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "1"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: taxlens-db
        app.kubernetes.io/component: flyway
    spec:
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-pg
          image: docker.io/library/busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z taxlens-pg {{ .Values.postgres.port }}; do
                sleep 2
              done
              echo "PostgreSQL is ready."
          resources:
            limits:
              memory: 16Mi
      containers:
        - name: flyway
          image: "{{ .Values.flyway.image }}:{{ .Values.flyway.tag }}"
          imagePullPolicy: Never
          command:
            - python
            - -m
            - db.flyway
            - migrate
            - --db-url
            - "postgres://postgres:$(PG_PASSWORD)@taxlens-pg:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}"
          env:
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.secretName }}
                  key: {{ .Values.postgres.passwordKey }}
          resources:
            {{- toYaml .Values.flyway.resources | nindent 12 }}
{{- end }}
