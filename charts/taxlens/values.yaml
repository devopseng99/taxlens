replicaCount: 1

image:
  repository: localhost/taxlens-api
  tag: latest
  pullPolicy: Never

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false

storage:
  root: /data/documents
  maxFileMb: "30"
  pvc:
    name: taxlens-docs
    size: 10Gi
    storageClass: my-local-storage

azure:
  secretName: azure-docai
  endpointKey: endpoint
  apiKeyKey: key

plaid:
  enabled: false
  secretName: plaid-credentials
  clientIdKey: client-id
  secretKey: secret
  fernetKeyKey: fernet-key
  env: sandbox

postgrest:
  url: "http://taxlens-postgrest.taxlens-db.svc:3000"
  jwtSecretName: taxlens-db-jwt
  jwtSecretKey: jwt-secret

admin:
  secretName: taxlens-admin
  adminKeyKey: admin-key

stripe:
  enabled: false
  secretName: taxlens-stripe
  # Keys in secret: secret-key, webhook-secret
  # Price IDs set via env vars in deployment

openfileDb:
  host: openfile-postgresql.openfile.svc.cluster.local
  port: "5432"
  name: openfile
  user: postgres
  password: EXBzXH9dLrsLEML6TOQtn7cN6fbVN4Pc

nodeSelector:
  kubernetes.io/hostname: mgplcb05

resources:
  limits:
    memory: 384Mi
  requests:
    cpu: 100m
    memory: 192Mi

startupProbe:
  httpGet:
    path: /api/health
    port: 8000
  failureThreshold: 10
  periodSeconds: 5

livenessProbe:
  httpGet:
    path: /api/health
    port: 8000
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /api/health
    port: 8000
  periodSeconds: 10
