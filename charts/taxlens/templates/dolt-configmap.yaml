{{- if .Values.dolt.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: taxlens-dolt-config
  labels:
    app.kubernetes.io/name: taxlens
    app.kubernetes.io/component: dolt
data:
  config.yaml: |
    log_level: info
    behavior:
      autocommit: true
    listener:
      host: "0.0.0.0"
      port: 3306
      max_connections: 20
    data_dir: /var/lib/dolt
{{- end }}
