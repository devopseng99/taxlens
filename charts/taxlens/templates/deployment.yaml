apiVersion: apps/v1
kind: Deployment
metadata:
  name: taxlens-api
  labels:
    app.kubernetes.io/name: taxlens
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: taxlens
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: taxlens
        app.kubernetes.io/component: api
    spec:
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      initContainers:
        - name: wait-for-postgrest
          image: docker.io/library/busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgREST..."
              until nc -z taxlens-postgrest.taxlens-db.svc 3000; do
                echo "PostgREST not ready, retrying in 2s..."
                sleep 2
              done
              echo "PostgREST is ready."
          resources:
            limits:
              memory: 16Mi
            requests:
              cpu: 10m
              memory: 8Mi
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: TAXLENS_STORAGE_ROOT
              value: {{ .Values.storage.root }}
            - name: TAXLENS_MAX_FILE_MB
              value: {{ .Values.storage.maxFileMb | quote }}
            - name: AZURE_DOCAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.azure.secretName }}
                  key: {{ .Values.azure.endpointKey }}
            - name: AZURE_DOCAI_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.azure.secretName }}
                  key: {{ .Values.azure.apiKeyKey }}
            {{- if .Values.plaid.enabled }}
            - name: PLAID_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.plaid.secretName }}
                  key: {{ .Values.plaid.clientIdKey }}
            - name: PLAID_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.plaid.secretName }}
                  key: {{ .Values.plaid.secretKey }}
            - name: PLAID_FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.plaid.secretName }}
                  key: {{ .Values.plaid.fernetKeyKey }}
            - name: PLAID_ENV
              value: {{ .Values.plaid.env | quote }}
            {{- end }}
            - name: POSTGREST_URL
              value: {{ .Values.postgrest.url | quote }}
            - name: DB_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgrest.jwtSecretName }}
                  key: {{ .Values.postgrest.jwtSecretKey }}
            - name: TAXLENS_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.admin.secretName }}
                  key: {{ .Values.admin.adminKeyKey }}
                  optional: true
            - name: OPENFILE_DB_HOST
              value: {{ .Values.openfileDb.host | quote }}
            - name: OPENFILE_DB_PORT
              value: {{ .Values.openfileDb.port | quote }}
            - name: OPENFILE_DB_NAME
              value: {{ .Values.openfileDb.name | quote }}
            - name: OPENFILE_DB_USER
              value: {{ .Values.openfileDb.user | quote }}
            - name: OPENFILE_DB_PASSWORD
              value: {{ .Values.openfileDb.password | quote }}
            {{- if .Values.stripe.enabled }}
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.stripe.secretName }}
                  key: secret-key
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.stripe.secretName }}
                  key: webhook-secret
            {{- end }}
          volumeMounts:
            - name: documents
              mountPath: {{ .Values.storage.root }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: documents
          persistentVolumeClaim:
            claimName: {{ .Values.storage.pvc.name }}
