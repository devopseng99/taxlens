{{- if .Values.dolt.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: taxlens-dolt
  labels:
    app.kubernetes.io/name: taxlens
    app.kubernetes.io/component: dolt
spec:
  type: ClusterIP
  ports:
    - port: 3306
      targetPort: 3306
      protocol: TCP
      name: mysql
  selector:
    app.kubernetes.io/name: taxlens
    app.kubernetes.io/component: dolt
{{- end }}
