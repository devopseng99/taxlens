{{- if .Values.dolt.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: taxlens-dolt
  labels:
    app.kubernetes.io/name: taxlens
    app.kubernetes.io/component: dolt
spec:
  serviceName: taxlens-dolt
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: taxlens
      app.kubernetes.io/component: dolt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: taxlens
        app.kubernetes.io/component: dolt
    spec:
      nodeSelector:
        kubernetes.io/hostname: mgplcb05
      initContainers:
        - name: init-dolt-db
          image: "{{ .Values.dolt.image }}:{{ .Values.dolt.tag }}"
          command:
            - sh
            - -c
            - |
              # Initialize the taxlens database directory if it doesn't exist
              if [ ! -d /var/lib/dolt/taxlens/.dolt ]; then
                echo "Initializing Dolt database 'taxlens'..."
                mkdir -p /var/lib/dolt/taxlens
                cd /var/lib/dolt/taxlens
                dolt init --name "TaxLens" --email "system@taxlens"
                echo "Dolt database initialized."
              else
                echo "Dolt database already exists, skipping init."
              fi
          volumeMounts:
            - name: dolt-data
              mountPath: /var/lib/dolt
      containers:
        - name: dolt
          image: "{{ .Values.dolt.image }}:{{ .Values.dolt.tag }}"
          command:
            - dolt
            - sql-server
            - --config
            - /etc/dolt/config.yaml
          ports:
            - containerPort: 3306
              protocol: TCP
              name: mysql
          volumeMounts:
            - name: dolt-data
              mountPath: /var/lib/dolt
            - name: dolt-config
              mountPath: /etc/dolt
          startupProbe:
            tcpSocket:
              port: 3306
            failureThreshold: 15
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3306
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 3306
            periodSeconds: 10
          resources:
            {{- toYaml .Values.dolt.resources | nindent 12 }}
      volumes:
        - name: dolt-data
          persistentVolumeClaim:
            claimName: {{ .Values.dolt.pvc.name }}
        - name: dolt-config
          configMap:
            name: taxlens-dolt-config
{{- end }}
