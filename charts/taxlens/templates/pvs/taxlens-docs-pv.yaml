apiVersion: v1
kind: PersistentVolume
metadata:
  name: taxlens-docs-pv
spec:
  capacity:
    storage: {{ .Values.storage.pvc.size }}
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: {{ .Values.storage.pvc.storageClass }}
  local:
    path: /opt/k8s-pers/vol1/taxlens-docs
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - mgplcb05
  claimRef:
    namespace: taxlens
    name: {{ .Values.storage.pvc.name }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.storage.pvc.name }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.storage.pvc.storageClass }}
  resources:
    requests:
      storage: {{ .Values.storage.pvc.size }}
